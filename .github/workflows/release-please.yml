name: "Release Please"

on:
  push:
    branches:
      - main
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run release-please
        uses: google-github-actions/release-please-action@v3
        with:
          token: "${{ secrets.GH_TOKEN }}"
          release-type: "simple"
