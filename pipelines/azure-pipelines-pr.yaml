name: $(MODULE_NAME)-$(date:yyyyMMdd)-$(rev:.r)
trigger: none
pr:
  branches:
    include:
      - refs/heads/main
  paths:
    include:
      - '**/*.tf'
      - '**/*.tf.json'
resources:
  repositories:
    - repository: self
    - repository: templates
      type: github
      name: Think-Cube/azure-devops-pipeline-templates
      ref: refs/heads/develop
      endpoint: github.com
variables:
  - group: GITHUB-PAT-TOKEN
  - name: VM_IMAGE
    value: ubuntu-latest
  - name: MODULE_NAME
    value: "terraform-azure-resource-group"
stages:
  - template: azure-devops/templates/pipelines/validate_and_regenerate_doc_tf_module.yml@templates
    parameters:
      terraformVersion: 'latest'
      tfsecVersion: 'v1.26.0'
      terraformDocsVersion: 'v0.19.0'
      GITHUB_REPO: 'Think-Cube/terraform-azure-resource-group'
      ModuleName: 'terraform-azure-resource-group'
      VM_IMAGE: 'ubuntu-latest'