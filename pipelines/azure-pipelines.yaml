name: $(MODULE_NAME)-$(date:yyyyMMdd)-$(rev:.r)
parameters:
  - name: publish_module
    type: boolean
    default: false
trigger:
  branches:
    include:
      - main
resources:
  repositories:
    - repository: self
    - repository: templates
      type: github
      name: Think-Cube/azure-devops-pipeline-templates
      ref: refs/heads/develop
      endpoint: github.com
variables:
  - name: VM_IMAGE
    value: ubuntu-latest
  - name: MODULE_NAME
    value: 'terraform-azure-resource-group'
stages:
  - template: azure-devops/templates/pipelines/validate_and_publish_tf_module.yml@templates
    parameters:
      publishModule: ${{ parameters.publish_module }}
      terraformVersion: 'latest'
      tfsecVersion: 'v1.26.0'
      allowTelemetryCollection: false
      GithubRepo: 'Think-Cube/terraform-azure-resource-group'
      ModuleName: 'terraform-azure-resource-group'
      ModuleDescription: 'Terraform module for azure resource group'